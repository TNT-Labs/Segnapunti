apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

react {
    /* Directories */
    root = file(projectRoot)
    reactNativeDir = file("$projectRoot/node_modules/react-native")
    codegenDir = file("$projectRoot/node_modules/@react-native/codegen")
    cliFile = file("$projectRoot/node_modules/react-native/cli.js")

    /* Hermes Engine - OBBLIGATORIO per React Native 0.76+ */
    hermesEnabled = true

    /* Flags per il bundler */
    bundleCommand = "bundle"

    /* Evita problemi con variant produttivi */
    debuggableVariants = ["debug"]
}

def enableProguardInReleaseBuilds = true

// Legge i valori da gradle.properties
def isNewArchEnabled = project.hasProperty("newArchEnabled") ? project.property("newArchEnabled").toString().toBoolean() : false
def isHermesEnabled = project.hasProperty("hermesEnabled") ? project.property("hermesEnabled").toString().toBoolean() : true

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.tntlabs.segnapunti"

    defaultConfig {
        applicationId "com.tntlabs.segnapunti"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        // VERSION SYNC - MUST INCREMENT for each Play Store release
        versionCode 11
        versionName "1.0.7"

        // Configurazione New Architecture e Hermes
        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchEnabled.toString()
        buildConfigField "boolean", "IS_HERMES_ENABLED", isHermesEnabled.toString()

        // Configurazione CMake per la New Architecture:
        // -DANDROID_STL=c++_shared usa la libc++ condivisa (richiesta da React Native).
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    // Punta al CMakeLists.txt dell'app che include ReactNative-application.cmake.
    // Questo fa compilare libreact_featureflagsjni.so e le altre librerie JNI
    // della New Architecture. Senza questo blocco, il build CMake non viene eseguito
    // e le librerie native non sono presenti nell'APK → UnsatisfiedLinkError a runtime.
    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('SEGNAPUNTI_UPLOAD_STORE_FILE')) {
                storeFile file(SEGNAPUNTI_UPLOAD_STORE_FILE)
                storePassword SEGNAPUNTI_UPLOAD_STORE_PASSWORD
                keyAlias SEGNAPUNTI_UPLOAD_KEY_ALIAS
                keyPassword SEGNAPUNTI_UPLOAD_KEY_PASSWORD
            }
        }
    }

    // SPLITS COMPLETAMENTE DISABILITATI - APK universale unico
    // splits {
    //     abi {
    //         reset()
    //         enable false
    //     }
    // }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false  // TEMPORANEAMENTE DISABILITATO per debug librerie native
            shrinkResources false  // TEMPORANEAMENTE DISABILITATO per debug librerie native
            crunchPngs false  // Disabilita PNG crunching per evitare errori AAPT2 su Windows
            // proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    buildFeatures {
        buildConfig true  // Necessario per generare BuildConfig.java con i campi custom
    }

    packagingOptions {
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'

        // Include tutte le librerie Hermes
        pickFirst 'lib/x86/libhermes.so'
        pickFirst 'lib/x86_64/libhermes.so'
        pickFirst 'lib/armeabi-v7a/libhermes.so'
        pickFirst 'lib/arm64-v8a/libhermes.so'

        // RICHIESTO per HyperOS/MIUI: forza estrazione delle .so su disco durante l'installazione.
        // useLegacyPackaging = false → .so compresse nell'APK (DEFLATE).
        // Con libs compresse il Package Manager DEVE estrarre su disco (non può caricare
        // direttamente un file deflated), ignorando qualsiasi restrizione HyperOS/MIUI.
        // useLegacyPackaging = true (default legacy) → .so non compresse nell'APK:
        // HyperOS 2.0 le vede "accessibili" e bypassa extractNativeLibs="true",
        // poi blocca il mapping diretto dall'APK → UnsatisfiedLinkError.
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

// Fix: externalNativeBuildClean crasha quando le directory codegen JNI delle librerie
// non esistono ancora (vengono pulite PRIMA che CMake possa riconfigurare).
// gradle.taskGraph.whenReady intercetta i task dopo che il grafo è completamente
// risolto, inclusi quelli registrati lazily da AGP 8.x.
gradle.taskGraph.whenReady { graph ->
    graph.allTasks.each { task ->
        if (task.name.startsWith("externalNativeBuildClean")) {
            task.enabled = false
        }
    }
}

// Cancella .cxx direttamente come parte del task clean
tasks.register("deleteCxxCache", Delete) {
    delete "${project.projectDir}/.cxx"
}

project.afterEvaluate {
    tasks.named("clean").configure {
        dependsOn "deleteCxxCache"
    }

    // Assicura che il task di autolinking (che genera rncli.cpp e rncli.h) venga eseguito
    // PRIMA della configurazione CMake. Necessario perché la cache Gradle può contenere
    // output obsoleti (senza rncli.h/rncli.cpp) se jni/ è stato aggiunto a un progetto
    // esistente. Usa un match case-insensitive per coprire eventuali varianti del nome.
    tasks.configureEach { cmakeTask ->
        if (cmakeTask.name.startsWith("configureCMake") || cmakeTask.name.startsWith("buildCMake")) {
            tasks.matching { autolinkTask ->
                autolinkTask.name.toLowerCase().contains("packagelist") ||
                autolinkTask.name.toLowerCase().contains("autolinking")
            }.each { autolinkTask ->
                cmakeTask.dependsOn(autolinkTask)
            }
        }
    }
}

dependencies {
    // React Native core
    implementation("com.facebook.react:react-android")

    // Hermes Engine - versione gestita dal BOM del react-native-gradle-plugin.
    // NON usare le varianti -debug/-release: sono AAR separati che non includono
    // libhermes_executor.so (necessaria per Old Architecture). L'AAR base include tutto.
    implementation("com.facebook.react:hermes-android")

    // Moduli React Native - NECESSARI per il classpath Java
    implementation project(':react-native-async-storage_async-storage')
    implementation project(':react-native-gesture-handler')
    implementation project(':react-native-google-mobile-ads')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-screens')
    implementation project(':react-native-vector-icons')
}
